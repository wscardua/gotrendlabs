name: gotrendlabs

services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - ../../.env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ../../.runtime/caddy-certs:/etc/caddy/certs:ro
      - staticfiles:/srv/static:ro
      - mediafiles:/srv/media:ro
    depends_on:
      - django

  django:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000
    env_file:
      - ../../.env.prod
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/media
      - runtime:/app/.runtime
    depends_on:
      - fastapi

  fastapi:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn backend_api.main:app --host 0.0.0.0 --port 8001
    env_file:
      - ../../.env.prod
    volumes:
      - runtime:/app/.runtime

  daemon:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python manage.py run_gotrendlabs_daemon --interval-seconds 60
    env_file:
      - ../../.env.prod
    volumes:
      - runtime:/app/.runtime
    depends_on:
      - fastapi

volumes:
  caddy_data:
  caddy_config:
  staticfiles:
  mediafiles:
  runtime:
