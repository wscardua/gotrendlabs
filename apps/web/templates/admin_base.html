{% load static %}
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GoTrendLabs Admin{% endblock %}</title>
  <link rel="icon" href="{% static 'brand/gtl-constellation-mark-light.svg' %}?v=20260605-favicon" type="image/svg+xml" media="(prefers-color-scheme: light)">
  <link rel="icon" href="{% static 'brand/gtl-constellation-mark-dark.svg' %}?v=20260605-favicon" type="image/svg+xml" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="{% static 'brand/gtl-constellation-mark-light.svg' %}?v=20260605-favicon" type="image/svg+xml">
  <meta name="theme-color" content="#F4F2E9" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#101413" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="{% static 'css/gotrendlabs.css' %}?v=20260607-contracts-close-alert">
  <script src="{% static 'js/gotrendlabs.js' %}?v=20260605-email-template-preview" defer></script>
</head>
<body>
  <header class="topbar admin-topbar">
    <nav class="shell nav admin-nav">
      <a class="brand" href="{% url 'admin-ops-dashboard' %}" aria-label="GoTrendLabs Admin">
        <span class="brand-logo" aria-hidden="true">
          <img class="brand-logo-image brand-logo-light" src="{% static 'brand/gtl-constellation-mark-light.svg' %}?v=20260604-split-lockup" alt="">
          <img class="brand-logo-image brand-logo-dark" src="{% static 'brand/gtl-constellation-mark-dark.svg' %}?v=20260604-split-lockup" alt="">
        </span>
        <span class="brand-wordmark">GoTrendLabs</span>
        <span class="brand-admin-label">Admin</span>
      </a>
      <div class="nav-links admin-nav-links">
        <a class="nav-link {% if request.resolver_match.url_name == 'admin-ops-dashboard' %}active{% endif %}" href="{% url 'admin-ops-dashboard' %}">Dashboard</a>
        <a class="nav-link {% if request.resolver_match.url_name == 'admin-ops-config' %}active{% endif %}" href="{% url 'admin-ops-config' %}">Config</a>
        <a class="nav-link {% if 'email-' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'admin-ops-email-templates' %}">Politica de Emails</a>
        <a class="nav-link {% if 'ai-agent' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'admin-ops-ai-agents' %}">Agentes IA</a>
        <a class="nav-link {% if 'user' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'admin-ops-users' %}">Usuários</a>
        <a class="nav-link {% if 'taxonomy' in request.resolver_match.url_name or 'category' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'admin-ops-taxonomy' %}">Categorias</a>
        <a class="nav-link {% if 'badge' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'admin-ops-badges' %}">Badge</a>
        <a class="nav-link {% if 'market' in request.resolver_match.url_name and 'resolution' not in request.resolver_match.url_name %}active{% endif %}" href="{% url 'admin-ops-markets' %}">Mercado</a>
        <a class="nav-link {% if 'resolution' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'admin-ops-resolution' %}">Resolução</a>
        <a class="nav-link {% if 'moderation' in request.resolver_match.url_name or 'queue' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'admin-ops-moderation' %}">Filas</a>
        <a class="nav-link {% if 'system-log' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'admin-ops-system-logs' %}">Logs</a>
      </div>
      <div class="nav-actions admin-nav-actions"><button class="theme-toggle" type="button" data-theme-toggle aria-label="Alternar dark mode">◐</button><a class="btn ghost" href="{% url 'home' %}">Ver site público</a></div>
    </nav>
  </header>
  {% block content %}{% endblock %}
</body>
</html>
