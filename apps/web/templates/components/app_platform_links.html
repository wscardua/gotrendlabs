<div class="app-platform-links {{ platform_links_class }}" aria-label="Apps disponíveis">
  {% if android_app_release.available %}
    <a class="app-platform-pill android-pill {{ platform_item_class }}" href="{{ android_app_release.download_url }}" download>
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7.2 8.4h9.6a1.8 1.8 0 0 1 1.8 1.8v6.9a1.8 1.8 0 0 1-1.8 1.8H7.2a1.8 1.8 0 0 1-1.8-1.8v-6.9a1.8 1.8 0 0 1 1.8-1.8Z"></path>
        <path d="M8.7 6.9 7.5 4.8M15.3 6.9l1.2-2.1M8.4 11.7h.1M15.5 11.7h.1M8.1 18.9v1.8M15.9 18.9v1.8M3.9 10.7v5.4M20.1 10.7v5.4"></path>
      </svg>
      <span><strong>App Android</strong><small>{{ android_app_release.label }}</small></span>
    </a>
  {% else %}
    <span class="app-platform-pill android-pill is-disabled {{ platform_item_class }}">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7.2 8.4h9.6a1.8 1.8 0 0 1 1.8 1.8v6.9a1.8 1.8 0 0 1-1.8 1.8H7.2a1.8 1.8 0 0 1-1.8-1.8v-6.9a1.8 1.8 0 0 1 1.8-1.8Z"></path>
        <path d="M8.7 6.9 7.5 4.8M15.3 6.9l1.2-2.1M8.4 11.7h.1M15.5 11.7h.1M8.1 18.9v1.8M15.9 18.9v1.8M3.9 10.7v5.4M20.1 10.7v5.4"></path>
      </svg>
      <span><strong>App Android</strong><small>{{ android_app_release.label }}</small></span>
    </span>
  {% endif %}
  <span class="app-platform-pill ios-soon-link is-disabled {{ platform_item_class }}">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M9 3.8h6A2.2 2.2 0 0 1 17.2 6v12A2.2 2.2 0 0 1 15 20.2H9A2.2 2.2 0 0 1 6.8 18V6A2.2 2.2 0 0 1 9 3.8Z"></path>
      <path d="M10.2 6.1h3.6M11 17.7h2"></path>
    </svg>
    <span><strong>App iOS</strong><small>Em breve</small></span>
  </span>
</div>
