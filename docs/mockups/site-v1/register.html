<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Orynth | Cadastro</title><link rel="stylesheet" href="styles.css"></head>
<body>
  <main class="shell hero">
    <section class="panel" style="max-width:760px;margin:auto">
      <a class="brand" href="index.html"><span class="brand-mark">O</span><span>Orynth</span></a>
      <h1>Crie seu perfil de previsão.</h1>
      <form class="form-grid">
        <div class="field"><label>Nome público</label><input value="Will Costa"></div>
        <div class="field"><label>Idioma</label><select><option>Português Brasil</option><option>English</option></select></div>
        <div class="field full"><label>Email</label><input value="will@orynth.test"></div>
        <div class="field"><label>Senha</label><input type="password" value="12345678"></div>
        <div class="field"><label>Confirmar senha</label><input type="password" value="12345678"></div>
        <a class="btn primary" href="index.html">Criar conta e receber OC iniciais</a>
        <a class="btn ghost" href="login.html">Já tenho conta</a>
      </form>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
