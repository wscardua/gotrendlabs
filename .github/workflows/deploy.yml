name: GoTrendLabs CI and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gotrendlabs
          POSTGRES_USER: gotrendlabs
          POSTGRES_PASSWORD: gotrendlabs_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gotrendlabs -d gotrendlabs"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        env:
          POSTGRES_DB: gotrendlabs
          POSTGRES_USER: gotrendlabs
          POSTGRES_PASSWORD: gotrendlabs_dev_password
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5432"
        run: python manage.py test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && vars.ENABLE_PROD_DEPLOY == '1'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Validate deploy configuration
        env:
          ENABLE_PROD_DEPLOY: ${{ vars.ENABLE_PROD_DEPLOY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          ROLE_ARN_VAR: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          ROLE_ARN_SECRET: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          INSTANCE_ID_VAR: ${{ vars.AWS_EC2_INSTANCE_ID }}
          INSTANCE_ID_SECRET: ${{ secrets.AWS_EC2_INSTANCE_ID }}
        run: |
          ROLE_ARN="${ROLE_ARN_VAR:-${ROLE_ARN_SECRET:-}}"
          INSTANCE_ID="${INSTANCE_ID_VAR:-${INSTANCE_ID_SECRET:-}}"

          if [[ "$ENABLE_PROD_DEPLOY" != "1" ]]; then
            echo "ENABLE_PROD_DEPLOY must be set to 1 for production deploys." >&2
            exit 1
          fi

          if [[ -z "$ROLE_ARN" ]]; then
            echo "Missing AWS_GITHUB_ACTIONS_ROLE_ARN. Configure it as a repository variable; the legacy secret fallback remains supported temporarily." >&2
            exit 1
          fi

          if [[ ! "$ROLE_ARN" =~ ^arn:aws:iam::204620194924:role/ ]]; then
            echo "AWS_GITHUB_ACTIONS_ROLE_ARN must point to an IAM role in account 204620194924. Got: $ROLE_ARN" >&2
            exit 1
          fi

          if [[ -z "$INSTANCE_ID" ]]; then
            echo "Missing AWS_EC2_INSTANCE_ID. Configure it as a repository variable or secret." >&2
            exit 1
          fi

          if [[ ! "$INSTANCE_ID" =~ ^i-[a-z0-9]+$ ]]; then
            echo "AWS_EC2_INSTANCE_ID must look like an EC2 instance id. Got: $INSTANCE_ID" >&2
            exit 1
          fi

          if [[ ! "$AWS_REGION" =~ ^[a-z]{2}-[a-z]+-[0-9]+$ ]]; then
            echo "AWS_REGION must be a valid region code. Got: $AWS_REGION" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN || secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          role-session-name: GitHubActionsDeploy
          allowed-account-ids: 204620194924

      - name: Verify assumed AWS identity
        run: aws sts get-caller-identity

      - name: Trigger deploy over SSM
        id: ssm
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          APP_DIR: ${{ vars.APP_DIR || '/opt/gotrendlabs' }}
          BRANCH: ${{ vars.DEPLOY_BRANCH || 'main' }}
          REPO_URL: ${{ vars.REPO_URL || format('https://github.com/{0}.git', github.repository) }}
          INSTANCE_ID: ${{ vars.AWS_EC2_INSTANCE_ID || secrets.AWS_EC2_INSTANCE_ID }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy GoTrendLabs from GitHub Actions" \
            --parameters commands="[
              \"set -eu\",
              \"export APP_DIR='$APP_DIR'\",
              \"export BRANCH='$BRANCH'\",
              \"export REPO_URL='$REPO_URL'\",
              \"if [ ! -d '$APP_DIR/.git' ]; then mkdir -p '$APP_DIR'; git clone --branch '$BRANCH' '$REPO_URL' '$APP_DIR'; fi\",
              \"cd '$APP_DIR'\",
              \"git fetch origin '$BRANCH'\",
              \"git checkout '$BRANCH'\",
              \"git pull --ff-only origin '$BRANCH'\",
              \"bash ops/deploy/production/deploy.sh\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy to finish
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          INSTANCE_ID: ${{ vars.AWS_EC2_INSTANCE_ID || secrets.AWS_EC2_INSTANCE_ID }}
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          for _ in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)

            echo "Current status: $STATUS"

            if [[ "$STATUS" == "Success" ]]; then
              exit 0
            fi

            if [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for deployment to finish."
          exit 1
